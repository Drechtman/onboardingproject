<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Random Question Generator</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #f4f7f6;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }
        .card {
            background: white;
            padding: 30px;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
            text-align: center;
            max-width: 450px;
            width: 100%;
        }
        h1 {
            color: #333;
            font-size: 24px;
            margin-bottom: 20px;
        }
        .display-area {
            min-height: 100px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            margin-bottom: 20px;
            border-left: 4px solid #007BFF;
            padding-left: 15px;
            text-align: left;
        }
        .name {
            font-weight: bold;
            color: #007BFF;
            font-size: 18px;
            margin-bottom: 5px;
        }
        .question {
            color: #555;
            font-size: 20px;
            font-style: italic;
        }
        button {
            background-color: #007BFF;
            color: white;
            border: none;
            padding: 12px 24px;
            font-size: 16px;
            border-radius: 6px;
            cursor: pointer;
            transition: background 0.2s ease;
        }
        button:hover {
            background-color: #0056b3;
        }
    </style>
</head>
<body>

    <div class="card">
        <h1>Icebreaker!</h1>
        
        <div class="display-area">
            <div id="name-output" class="name">Click the button to start!</div>
            <div id="question-output" class="question"></div>
        </div>

        <button id="generate-btn">Generate Question</button>
    </div>

    <script src="script.js"></script>
</body>
</html>
